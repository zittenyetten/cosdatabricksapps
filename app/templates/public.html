<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>COSBELLE RAG Chat</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body class="public-body">
  <aside class="chat-sidebar">
    <div class="brand-card">
      <span class="brand-kicker">COSBELLE</span>
      <strong>RAG<br />CHAT</strong>
      <span class="brand-caption">User workspace</span>
    </div>

    <div class="conversation-list">
      <button class="active" type="button" id="newPublicChat">새 질문</button>
    </div>

    <div class="public-role-card">
      <label for="publicRoleSelect">Role</label>
      <select id="publicRoleSelect">
        <option value="GENERAL_EMPLOYEE">GENERAL_EMPLOYEE</option>
      </select>
      <p>RBAC / Pre-check / Post-check는 운영 모드로 고정됩니다.</p>
    </div>

    <a class="admin-link" href="/admin-login">Admin Login</a>
  </aside>

  <main class="public-chat">
    <header class="topbar">
      <div>
        <p class="eyebrow">Common display</p>
        <h1>Question & Response Chatbot</h1>
      </div>
      <div class="status-cluster">
        <span class="status-dot"></span>
        <span id="publicProfile">GENERAL_EMPLOYEE / INTERNAL</span>
      </div>
    </header>

    <section class="user-chat-layout">
      <div class="panel chat-main">
        <div id="publicMessages" class="public-messages"></div>

        <form id="publicChatForm" class="chat-composer">
          <div class="composer-input">
            <textarea
              id="publicQuestion"
              rows="3"
              placeholder="질문을 입력하세요. /chat 일반 대화 · /work 데이터 조회 또는 그냥 물어보세요!"
            ></textarea>
            <p class="composer-hint">예: /chat 오늘 날씨는 어때? · 안녕</p>
          </div>
          <button class="primary" type="submit">Send</button>
        </form>
      </div>

      <aside class="panel profile-panel">
        <p class="eyebrow">Current identity</p>
        <div class="profile-row"><span>Role</span><strong id="publicRole">GENERAL_EMPLOYEE</strong></div>
        <div class="profile-row"><span>Department</span><strong id="publicDepartment">General</strong></div>
        <div class="profile-row"><span>Clearance</span><strong id="publicClearance">INTERNAL</strong></div>
        <div class="guard-card">
          <span>Guard status</span>
          <strong id="publicGuard">READY</strong>
        </div>
        <div class="source-list" id="publicCitations">반환된 출처 없음</div>
      </aside>
    </section>
  </main>

  <script src="/static/stream.js?v=sse-post"></script>
  <script src="/static/public.js?v=sse-chat"></script>
</body>
</html>
