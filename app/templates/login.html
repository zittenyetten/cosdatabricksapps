<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="brand-card login-brand">
      <span class="brand-kicker">COSBELLE</span>
      <strong>RAG<br />ADMIN</strong>
      <span class="brand-caption">관리자 전용 콘솔</span>
    </section>

    <form id="loginForm" class="panel login-panel">
      <p class="eyebrow">Admin Login</p>
      <h1>관리자 로그인</h1>
      <label for="username">아이디</label>
      <input id="username" value="admin" autocomplete="username" />
      <label for="password">비밀번호</label>
      <input id="password" value="admin" type="password" autocomplete="current-password" />
      <button class="primary" type="submit">Login</button>
      <p id="loginMessage" class="login-message"></p>
      <a href="/">공통 Chat으로 돌아가기</a>
    </form>
  </main>

  <script src="/static/login.js"></script>
</body>
</html>
